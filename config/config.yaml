input:
  folder: data/raw/expt_PS22_Mapping
  indices: [2]
  rename: ['PS22_2 Depth -ve']
  
analysistype: 'positional' # 'positional' or 'non-positional'

plotting:
  focus_range: [300, 3000]
  offset:
      enabled: true
      step: 0.0012  # vertical offset between spectra
  mappingmode: "pixel" # "pixel", "scatter", "interp" or "hybrid"

processing:
  baseline: true
  normalize: true
  smoothing: true
  show_baseline: true

peaks:
  tolerance: 0.1

  ranges:
    range1:
      bounds: [630, 720]
      peaks: [650, 669, 681, 705]

    range2:
      bounds: [1680, 1770]
      peaks: [1728]

ratios:
  - [1728, 681]

